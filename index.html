<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>US States Geography Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:sans-serif;background:#f5f4f0;color:#1a1a1a;display:flex;flex-direction:column;height:100vh;}

.screen{display:none;flex-direction:column;height:100%;}
.screen.active{display:flex;}

#setup-screen{align-items:center;justify-content:center;gap:1.25rem;padding:1.5rem 1rem;overflow-y:auto;}
#setup-screen h1{font-size:22px;font-weight:500;}
#setup-screen .sub{font-size:14px;color:#555;text-align:center;max-width:400px;}
.mode-label{font-size:13px;color:#555;}
.option-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;max-width:460px;}
.option-btn{padding:11px 6px;border:1.5px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;font-weight:500;color:#1a1a1a;transition:all .15s;}
.option-btn:hover{border-color:#888;background:#f0f0f0;}
.option-btn.selected{border-color:#185FA5;background:#E6F1FB;color:#185FA5;}
#start-btn{padding:10px 32px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;}
#start-btn:disabled{opacity:.35;cursor:not-allowed;}

#game-screen{padding:.6rem .75rem;gap:.4rem;}
#hud{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#state-prompt{font-size:19px;font-weight:500;text-align:center;flex:1;color:#1a1a1a;}
#score-box{font-size:13px;color:#555;text-align:right;min-width:100px;}
#counter-box{min-width:70px;font-size:12px;color:#555;}
#progress-bar-wrap{height:3px;background:#ddd;border-radius:2px;overflow:hidden;flex-shrink:0;}
#progress-bar{height:3px;background:#185FA5;border-radius:2px;transition:width .3s;}
#map-container{position:relative;flex:1;min-height:0;border-radius:8px;overflow:hidden;border:1px solid #ddd;}
#map-svg{position:absolute;top:0;left:0;width:100%;height:100%;display:block;background:#e8e8e8;cursor:crosshair;}
#feedback-row{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:34px;gap:8px;}
#feedback{font-size:13px;font-weight:500;flex:1;}
#next-btn{display:none;padding:7px 20px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;}

#results-screen{align-items:center;justify-content:center;gap:1.25rem;padding:2rem 1rem;}
#results-screen h2{font-size:20px;font-weight:500;}
#final-score{font-size:52px;font-weight:500;color:#185FA5;}
#results-screen .sub{color:#555;font-size:14px;}
#play-again-btn{padding:10px 28px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;}
</style>
</head>
<body>

<div id="setup-screen" class="screen active">
  <h1>&#x1F5FA;&#xFE0F; US States Geography Quiz</h1>
  <p class="sub">Click on the map to place each state. The closer your click, the more points you earn!</p>
  <p class="mode-label">How many states do you want to review?</p>
  <div class="option-grid">
    <button class="option-btn" data-count="10">10 states</button>
    <button class="option-btn" data-count="20">20 states</button>
    <button class="option-btn" data-count="30">30 states</button>
    <button class="option-btn" data-count="48">All 48</button>
  </div>
  <button id="start-btn" disabled>Start game</button>
</div>

<div id="game-screen" class="screen">
  <div id="hud">
    <div id="counter-box">0 / 0</div>
    <div id="state-prompt">&#8212;</div>
    <div id="score-box">Score: <strong>0</strong></div>
  </div>
  <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
  <div id="map-container">
    <svg id="map-svg" viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <g id="states-layer"></g>
      <g id="overlay-layer"></g>
    </svg>
  </div>
  <div id="feedback-row">
    <div id="feedback"></div>
    <button id="next-btn">Next &#8594;</button>
  </div>
</div>

<div id="results-screen" class="screen">
  <h2>Game over!</h2>
  <div id="final-score">0</div>
  <p id="results-detail" class="sub"></p>
  <button id="play-again-btn">Play again</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
var MAP_FILL = '#d0cfc9';

var STATE_DATA = {
  "Alabama":{"fips":"01"},"Arizona":{"fips":"04"},"Arkansas":{"fips":"05"},
  "California":{"fips":"06"},"Colorado":{"fips":"08"},"Connecticut":{"fips":"09"},
  "Delaware":{"fips":"10"},"Florida":{"fips":"12"},"Georgia":{"fips":"13"},
  "Idaho":{"fips":"16"},"Illinois":{"fips":"17"},"Indiana":{"fips":"18"},
  "Iowa":{"fips":"19"},"Kansas":{"fips":"20"},"Kentucky":{"fips":"21"},
  "Louisiana":{"fips":"22"},"Maine":{"fips":"23"},"Maryland":{"fips":"24"},
  "Massachusetts":{"fips":"25"},"Michigan":{"fips":"26"},"Minnesota":{"fips":"27"},
  "Mississippi":{"fips":"28"},"Missouri":{"fips":"29"},"Montana":{"fips":"30"},
  "Nebraska":{"fips":"31"},"Nevada":{"fips":"32"},"New Hampshire":{"fips":"33"},
  "New Jersey":{"fips":"34"},"New Mexico":{"fips":"35"},"New York":{"fips":"36"},
  "North Carolina":{"fips":"37"},"North Dakota":{"fips":"38"},"Ohio":{"fips":"39"},
  "Oklahoma":{"fips":"40"},"Oregon":{"fips":"41"},"Pennsylvania":{"fips":"42"},
  "Rhode Island":{"fips":"44"},"South Carolina":{"fips":"45"},"South Dakota":{"fips":"46"},
  "Tennessee":{"fips":"47"},"Texas":{"fips":"48"},"Utah":{"fips":"49"},
  "Vermont":{"fips":"50"},"Virginia":{"fips":"51"},"Washington":{"fips":"53"},
  "West Virginia":{"fips":"54"},"Wisconsin":{"fips":"55"},"Wyoming":{"fips":"56"}
};

var CONTIGUOUS_FIPS = new Set(Object.values(STATE_DATA).map(function(d){ return d.fips; }));
var projection, pathGen, topoData, geoFeatures;
var gameCount = 0, stateQueue = [], currentIdx = 0, totalScore = 0, answered = false, selectedCount = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

// Use SVG's own coordinate transform matrix — works correctly regardless of
// how the SVG is scaled or letterboxed inside its container.
function clientToSVG(svg, clientX, clientY) {
  var pt = svg.createSVGPoint();
  pt.x = clientX;
  pt.y = clientY;
  var svgPt = pt.matrixTransform(svg.getScreenCTM().inverse());
  return [svgPt.x, svgPt.y];
}

document.querySelectorAll('.option-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.option-btn').forEach(function(b){ b.classList.remove('selected'); });
    btn.classList.add('selected');
    selectedCount = parseInt(btn.dataset.count);
    document.getElementById('start-btn').disabled = false;
  });
});

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('next-btn').addEventListener('click', nextState);
document.getElementById('play-again-btn').addEventListener('click', function(){
  document.querySelectorAll('.option-btn').forEach(function(b){ b.classList.remove('selected'); });
  document.getElementById('start-btn').disabled = true;
  selectedCount = null;
  showScreen('setup-screen');
});

function loadMap() {
  if (topoData) return Promise.resolve();
  return fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json')
    .then(function(res){ return res.json(); })
    .then(function(data){
      topoData = data;
      geoFeatures = topojson.feature(topoData, topoData.objects.states).features
        .filter(function(f){ return CONTIGUOUS_FIPS.has(f.id.toString().padStart(2,'0')); });
      projection = d3.geoAlbersUsa().scale(1280).translate([480, 300]);
      pathGen = d3.geoPath().projection(projection);
      var layer = document.getElementById('states-layer');
      layer.innerHTML = '';
      geoFeatures.forEach(function(f){
        var p = document.createElementNS('http://www.w3.org/2000/svg','path');
        p.setAttribute('d', pathGen(f));
        p.setAttribute('fill', MAP_FILL);
        p.setAttribute('stroke', MAP_FILL);
        p.setAttribute('stroke-width', '0.5');
        p.dataset.fips = f.id.toString().padStart(2,'0');
        layer.appendChild(p);
      });
    });
}

function startGame() {
  showScreen('game-screen');
  totalScore = 0; currentIdx = 0; answered = false;
  var names = Object.keys(STATE_DATA);
  names.sort(function(){ return Math.random() - 0.5; });
  stateQueue = names.slice(0, selectedCount);
  gameCount = stateQueue.length;
  document.getElementById('score-box').innerHTML = 'Score: <strong>0</strong>';
  loadMap().then(function(){ showState(); });
}

function showState() {
  answered = false;
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('feedback').textContent = '';
  document.getElementById('overlay-layer').innerHTML = '';
  resetStateColors();
  document.getElementById('state-prompt').textContent = stateQueue[currentIdx];
  document.getElementById('counter-box').textContent = (currentIdx + 1) + ' / ' + gameCount;
  document.getElementById('progress-bar').style.width = (currentIdx / gameCount * 100) + '%';
  document.getElementById('map-svg').style.cursor = 'crosshair';
}

function resetStateColors() {
  document.getElementById('states-layer').querySelectorAll('path').forEach(function(p){
    p.setAttribute('fill', MAP_FILL);
    p.setAttribute('stroke', MAP_FILL);
    p.setAttribute('stroke-width', '0.5');
  });
}

function closestPointOnRings(rings, lng, lat) {
  var min = Infinity;
  var px = projection([lng, lat]);
  if (!px) return min;
  for (var r = 0; r < rings.length; r++) {
    var ring = rings[r];
    for (var i = 0; i < ring.length - 1; i++) {
      var a = projection(ring[i]), b = projection(ring[i+1]);
      if (!a || !b) continue;
      var dx = b[0]-a[0], dy = b[1]-a[1], lenSq = dx*dx + dy*dy;
      var t = lenSq > 0 ? ((px[0]-a[0])*dx + (px[1]-a[1])*dy) / lenSq : 0;
      t = Math.max(0, Math.min(1, t));
      var d = Math.sqrt(Math.pow(px[0]-(a[0]+t*dx),2) + Math.pow(px[1]-(a[1]+t*dy),2));
      if (d < min) min = d;
    }
  }
  return min;
}

function getRings(feature) {
  var rings = [];
  var g = feature.geometry;
  if (g.type === 'Polygon') {
    rings = rings.concat(g.coordinates);
  } else if (g.type === 'MultiPolygon') {
    g.coordinates.forEach(function(p){ rings = rings.concat(p); });
  }
  return rings;
}

document.getElementById('map-svg').addEventListener('click', function(e){
  if (answered) return;
  answered = true;
  this.style.cursor = 'default';

  var coords = clientToSVG(this, e.clientX, e.clientY);
  var svgX = coords[0], svgY = coords[1];

  var stateName = stateQueue[currentIdx];
  var fips = STATE_DATA[stateName].fips;
  var feature = null;
  for (var i = 0; i < geoFeatures.length; i++) {
    if (geoFeatures[i].id.toString().padStart(2,'0') === fips) { feature = geoFeatures[i]; break; }
  }
  if (!feature) return;

  var tp = document.getElementById('states-layer').querySelector('[data-fips="' + fips + '"]');
  if (tp) {
    tp.setAttribute('fill', '#B5D4F4');
    tp.setAttribute('stroke', '#185FA5');
    tp.setAttribute('stroke-width', '2');
  }

  var centroid = pathGen.centroid(feature);
  var geoCoord = projection.invert([svgX, svgY]);
  var isInside = geoCoord ? d3.geoContains(feature, geoCoord) : false;

  var points;
  if (isInside) {
    points = 100;
  } else {
    var distPx;
    if (geoCoord) {
      distPx = closestPointOnRings(getRings(feature), geoCoord[0], geoCoord[1]);
    } else {
      distPx = Math.sqrt(Math.pow(svgX-centroid[0],2) + Math.pow(svgY-centroid[1],2));
    }
    points = Math.min(99, Math.max(0, Math.round(100 * Math.exp(-distPx / 80))));
  }

  totalScore += points;
  document.getElementById('score-box').innerHTML = 'Score: <strong>' + totalScore.toLocaleString() + '</strong>';

  var ol = document.getElementById('overlay-layer');
  var ns = 'http://www.w3.org/2000/svg';
  var color = isInside ? '#1D9E75' : '#D85A30';

  var line = document.createElementNS(ns,'line');
  line.setAttribute('x1',svgX); line.setAttribute('y1',svgY);
  line.setAttribute('x2',centroid[0]); line.setAttribute('y2',centroid[1]);
  line.setAttribute('stroke',color); line.setAttribute('stroke-width','1.5');
  line.setAttribute('stroke-dasharray','4 3');
  ol.appendChild(line);

  var dot = document.createElementNS(ns,'circle');
  dot.setAttribute('cx',svgX); dot.setAttribute('cy',svgY); dot.setAttribute('r','6');
  dot.setAttribute('fill',color); dot.setAttribute('stroke','#fff'); dot.setAttribute('stroke-width','2');
  ol.appendChild(dot);

  var bx = svgX + 10, by = svgY - 18;
  var br = document.createElementNS(ns,'rect');
  br.setAttribute('x',bx-2); br.setAttribute('y',by-12);
  br.setAttribute('width','58'); br.setAttribute('height','18'); br.setAttribute('rx','4');
  br.setAttribute('fill',color);
  ol.appendChild(br);

  var bt = document.createElementNS(ns,'text');
  bt.setAttribute('x',bx+27); bt.setAttribute('y',by);
  bt.setAttribute('text-anchor','middle'); bt.setAttribute('fill','#fff');
  bt.setAttribute('font-size','11'); bt.setAttribute('font-weight','500');
  bt.textContent = '+' + points + ' pts';
  ol.appendChild(bt);

  var fb = document.getElementById('feedback');
  if (isInside) {
    fb.innerHTML = '&#10003; <strong>' + stateName + '</strong> &mdash; +' + points + ' pts';
    fb.style.color = '#0F6E56';
  } else {
    fb.innerHTML = '&#10007; That was <strong>' + stateName + '</strong> &mdash; +' + points + ' pts';
    fb.style.color = '#993C1D';
  }

  var nb = document.getElementById('next-btn');
  nb.style.display = 'block';
  nb.textContent = currentIdx === gameCount - 1 ? 'See results' : 'Next';
});

function nextState() {
  currentIdx++;
  if (currentIdx >= gameCount) endGame();
  else showState();
}

function endGame() {
  showScreen('results-screen');
  document.getElementById('final-score').textContent = totalScore.toLocaleString();
  var total = gameCount * 100;
  var pct = Math.round(totalScore / total * 100);
  document.getElementById('results-detail').textContent =
    gameCount + ' states \u00b7 ' + totalScore.toLocaleString() + ' / ' + total.toLocaleString() + ' pts (' + pct + '%)';
}
</script>
</body>
</html>
