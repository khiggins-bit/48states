
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#app { font-family: sans-serif; padding: 1rem; min-height: 500px; background: #f5f4f0; color: #1a1a1a; }
#setup-screen { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; padding: 2rem 1rem; }
#setup-screen h1 { font-size: 22px; font-weight: 500; }
#setup-screen p { font-size: 15px; color: #555; text-align: center; max-width: 400px; }
.option-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 480px; }
.option-btn { padding: 12px 8px; border: 1.5px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; font-size: 14px; font-weight: 500; color: #1a1a1a; transition: all 0.15s; }
.option-btn:hover { border-color: #888; background: #f0f0f0; }
.option-btn.selected { border-color: #185FA5; background: #E6F1FB; color: #185FA5; }
#start-btn { padding: 10px 32px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; }
#start-btn:disabled { opacity: 0.35; cursor: not-allowed; }
#game-screen { display: none; flex-direction: column; gap: 0.75rem; }
#hud { display: flex; align-items: center; justify-content: space-between; padding: 0 0 0.25rem; }
#state-prompt { font-size: 20px; font-weight: 500; text-align: center; flex: 1; color: #1a1a1a; }
#score-box { font-size: 14px; color: #555; text-align: right; min-width: 110px; }
#progress-bar-wrap { height: 4px; background: #ddd; border-radius: 2px; overflow: hidden; }
#progress-bar { height: 4px; background: #185FA5; border-radius: 2px; transition: width 0.3s; }
#map-container { position: relative; width: 100%; cursor: crosshair; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; }
#map-svg { width: 100%; height: auto; display: block; background: #e8e8e8; }
#feedback { min-height: 36px; text-align: center; font-size: 15px; font-weight: 500; }
#next-btn { display: none; margin: 0 auto; padding: 9px 28px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
#results-screen { display: none; flex-direction: column; align-items: center; gap: 1.25rem; padding: 2rem 1rem; }
#results-screen h2 { font-size: 20px; font-weight: 500; }
#final-score { font-size: 48px; font-weight: 500; color: #185FA5; }
#results-screen p { color: #555; font-size: 14px; }
#play-again-btn { padding: 10px 28px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
</style>

<div id="app">
  <div id="setup-screen">
    <h1>🗺️ US States Geography Quiz</h1>
    <p>Click on the map to place each state. The closer your click, the more points you earn!</p>
    <div>
      <p style="font-size:13px; color:#555; text-align:center; margin-bottom:10px;">How many states do you want to review?</p>
      <div class="option-grid">
        <button class="option-btn" data-count="10">10 states</button>
        <button class="option-btn" data-count="20">20 states</button>
        <button class="option-btn" data-count="30">30 states</button>
        <button class="option-btn" data-count="48">All 48</button>
      </div>
    </div>
    <button id="start-btn" disabled>Start game</button>
  </div>

  <div id="game-screen">
    <div id="hud">
      <div style="min-width:110px; font-size:13px; color:#555;" id="counter-box">0 / 0</div>
      <div id="state-prompt">—</div>
      <div id="score-box">Score: <strong>0</strong></div>
    </div>
    <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
    <div id="map-container">
      <svg id="map-svg" viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg">
        <g id="states-layer"></g>
        <g id="overlay-layer"></g>
      </svg>
    </div>
    <div id="feedback"></div>
    <button id="next-btn">Next state →</button>
  </div>

  <div id="results-screen">
    <h2>Game over!</h2>
    <div id="final-score">0</div>
    <p id="results-detail"></p>
    <button id="play-again-btn">Play again</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const MAP_FILL = '#d0cfc9';

const STATE_DATA = {
  "Alabama":{"fips":"01"},"Arizona":{"fips":"04"},"Arkansas":{"fips":"05"},
  "California":{"fips":"06"},"Colorado":{"fips":"08"},"Connecticut":{"fips":"09"},
  "Delaware":{"fips":"10"},"Florida":{"fips":"12"},"Georgia":{"fips":"13"},
  "Idaho":{"fips":"16"},"Illinois":{"fips":"17"},"Indiana":{"fips":"18"},
  "Iowa":{"fips":"19"},"Kansas":{"fips":"20"},"Kentucky":{"fips":"21"},
  "Louisiana":{"fips":"22"},"Maine":{"fips":"23"},"Maryland":{"fips":"24"},
  "Massachusetts":{"fips":"25"},"Michigan":{"fips":"26"},"Minnesota":{"fips":"27"},
  "Mississippi":{"fips":"28"},"Missouri":{"fips":"29"},"Montana":{"fips":"30"},
  "Nebraska":{"fips":"31"},"Nevada":{"fips":"32"},"New Hampshire":{"fips":"33"},
  "New Jersey":{"fips":"34"},"New Mexico":{"fips":"35"},"New York":{"fips":"36"},
  "North Carolina":{"fips":"37"},"North Dakota":{"fips":"38"},"Ohio":{"fips":"39"},
  "Oklahoma":{"fips":"40"},"Oregon":{"fips":"41"},"Pennsylvania":{"fips":"42"},
  "Rhode Island":{"fips":"44"},"South Carolina":{"fips":"45"},"South Dakota":{"fips":"46"},
  "Tennessee":{"fips":"47"},"Texas":{"fips":"48"},"Utah":{"fips":"49"},
  "Vermont":{"fips":"50"},"Virginia":{"fips":"51"},"Washington":{"fips":"53"},
  "West Virginia":{"fips":"54"},"Wisconsin":{"fips":"55"},"Wyoming":{"fips":"56"}
};
const CONTIGUOUS_FIPS = new Set(Object.values(STATE_DATA).map(d=>d.fips));

let projection, pathGen, topoData, geoFeatures;
let gameCount=0, stateQueue=[], currentIdx=0, totalScore=0, answered=false, selectedCount=null;

const setupScreen = document.getElementById('setup-screen');
const gameScreen = document.getElementById('game-screen');
const resultsScreen = document.getElementById('results-screen');
const statePrompt = document.getElementById('state-prompt');
const scoreBox = document.getElementById('score-box');
const counterBox = document.getElementById('counter-box');
const feedback = document.getElementById('feedback');
const nextBtn = document.getElementById('next-btn');
const progressBar = document.getElementById('progress-bar');
const mapSvg = document.getElementById('map-svg');
const statesLayer = document.getElementById('states-layer');
const overlayLayer = document.getElementById('overlay-layer');

document.querySelectorAll('.option-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedCount = parseInt(btn.dataset.count);
    document.getElementById('start-btn').disabled = false;
  });
});

document.getElementById('start-btn').addEventListener('click', startGame);
nextBtn.addEventListener('click', nextState);
document.getElementById('play-again-btn').addEventListener('click', () => {
  resultsScreen.style.display = 'none';
  setupScreen.style.display = 'flex';
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('start-btn').disabled = true;
  selectedCount = null;
});

async function loadMap() {
  if (topoData) return;
  const res = await fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json');
  topoData = await res.json();
  geoFeatures = topojson.feature(topoData, topoData.objects.states).features
    .filter(f => CONTIGUOUS_FIPS.has(f.id.toString().padStart(2,'0')));

  projection = d3.geoAlbersUsa().scale(1280).translate([480, 300]);
  pathGen = d3.geoPath().projection(projection);

  statesLayer.innerHTML = '';
  geoFeatures.forEach(f => {
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', pathGen(f));
    path.setAttribute('fill', MAP_FILL);
    path.setAttribute('stroke', MAP_FILL);
    path.setAttribute('stroke-width', '0.5');
    path.dataset.fips = f.id.toString().padStart(2,'0');
    statesLayer.appendChild(path);
  });
}

function startGame() {
  setupScreen.style.display = 'none';
  gameScreen.style.display = 'flex';
  gameScreen.style.flexDirection = 'column';
  totalScore=0; currentIdx=0; answered=false;
  const shuffled = Object.keys(STATE_DATA).sort(() => Math.random() - 0.5);
  stateQueue = shuffled.slice(0, selectedCount);
  gameCount = stateQueue.length;
  scoreBox.innerHTML = 'Score: <strong>0</strong>';
  loadMap().then(() => showState());
}

function showState() {
  answered = false;
  nextBtn.style.display = 'none';
  feedback.textContent = '';
  overlayLayer.innerHTML = '';
  resetStateColors();
  statePrompt.textContent = stateQueue[currentIdx];
  counterBox.textContent = (currentIdx+1) + ' / ' + gameCount;
  progressBar.style.width = (currentIdx/gameCount*100) + '%';
  mapSvg.style.cursor = 'crosshair';
}

function resetStateColors() {
  statesLayer.querySelectorAll('path').forEach(p => {
    p.setAttribute('fill', MAP_FILL);
    p.setAttribute('stroke', MAP_FILL);
    p.setAttribute('stroke-width', '0.5');
  });
}

mapSvg.addEventListener('click', function(e) {
  if (answered) return;
  answered = true;
  mapSvg.style.cursor = 'default';

  const rect = mapSvg.getBoundingClientRect();
  const scaleX = 960 / rect.width;
  const scaleY = 600 / rect.height;
  const svgX = (e.clientX - rect.left) * scaleX;
  const svgY = (e.clientY - rect.top) * scaleY;

  const stateName = stateQueue[currentIdx];
  const fips = STATE_DATA[stateName].fips;
  const feature = geoFeatures.find(f => f.id.toString().padStart(2,'0') === fips);
  if (!feature) return;

  const targetPath = statesLayer.querySelector(`[data-fips="${fips}"]`);
  if (targetPath) {
    targetPath.setAttribute('fill', '#B5D4F4');
    targetPath.setAttribute('stroke', '#185FA5');
    targetPath.setAttribute('stroke-width', '2');
  }

  const centroid = pathGen.centroid(feature);
  const bounds = pathGen.bounds(feature);
  const isInside = d3.geoContains(feature, projection.invert([svgX, svgY]));

  let points;
  if (isInside) {
    points = 100;
  } else {
    const dx = Math.max(bounds[0][0]-svgX, 0, svgX-bounds[1][0]);
    const dy = Math.max(bounds[0][1]-svgY, 0, svgY-bounds[1][1]);
    const distPx = Math.sqrt(dx*dx + dy*dy);
    points = Math.max(0, Math.round(100 * Math.exp(-distPx/80)));
  }

  totalScore += points;
  scoreBox.innerHTML = 'Score: <strong>' + totalScore.toLocaleString() + '</strong>';

  const lineEl = document.createElementNS('http://www.w3.org/2000/svg','line');
  lineEl.setAttribute('x1', svgX); lineEl.setAttribute('y1', svgY);
  lineEl.setAttribute('x2', centroid[0]); lineEl.setAttribute('y2', centroid[1]);
  lineEl.setAttribute('stroke', isInside ? '#1D9E75' : '#D85A30');
  lineEl.setAttribute('stroke-width', '1.5');
  lineEl.setAttribute('stroke-dasharray', '4 3');
  overlayLayer.appendChild(lineEl);

  const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
  dot.setAttribute('cx', svgX); dot.setAttribute('cy', svgY);
  dot.setAttribute('r', '6');
  dot.setAttribute('fill', isInside ? '#1D9E75' : '#D85A30');
  dot.setAttribute('stroke', '#fff');
  dot.setAttribute('stroke-width', '2');
  overlayLayer.appendChild(dot);

  const bx = svgX + 10, by = svgY - 18;
  const badgeRect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  badgeRect.setAttribute('x', bx-2); badgeRect.setAttribute('y', by-12);
  badgeRect.setAttribute('width', '56'); badgeRect.setAttribute('height', '18');
  badgeRect.setAttribute('rx', '4');
  badgeRect.setAttribute('fill', isInside ? '#1D9E75' : '#D85A30');
  const badgeTxt = document.createElementNS('http://www.w3.org/2000/svg','text');
  badgeTxt.setAttribute('x', bx+26); badgeTxt.setAttribute('y', by);
  badgeTxt.setAttribute('text-anchor', 'middle');
  badgeTxt.setAttribute('fill', '#fff');
  badgeTxt.setAttribute('font-size', '11');
  badgeTxt.setAttribute('font-weight', '500');
  badgeTxt.textContent = '+' + points + ' pts';
  overlayLayer.appendChild(badgeRect);
  overlayLayer.appendChild(badgeTxt);

  if (isInside) {
    feedback.innerHTML = '✓ Nice! <strong>' + stateName + '</strong> — +' + points + ' points';
    feedback.style.color = '#0F6E56';
  } else {
    feedback.innerHTML = '✗ That was <strong>' + stateName + '</strong> — +' + points + ' points';
    feedback.style.color = '#993C1D';
  }

  nextBtn.style.display = 'block';
  nextBtn.textContent = currentIdx === gameCount-1 ? 'See results' : 'Next state →';
});

function nextState() {
  currentIdx++;
  if (currentIdx >= gameCount) endGame();
  else showState();
}

function endGame() {
  gameScreen.style.display = 'none';
  resultsScreen.style.display = 'flex';
  document.getElementById('final-score').textContent = totalScore.toLocaleString();
  const pct = Math.round(totalScore / (gameCount*100) * 100);
  document.getElementById('results-detail').textContent =
    gameCount + ' states · ' + totalScore.toLocaleString() + ' / ' + (gameCount*100).toLocaleString() + ' possible points (' + pct + '%)';
}
</script>
